name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_SIGNING: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches configured version
        run: |
          V=$(grep -oP '^inkwell = "\K[^"]+' gradle/libs.versions.toml)
          if [ "v$V" != "${{ github.ref_name }}" ]; then
            echo "::error::tag ${{ github.ref_name }} 与 libs.versions.toml 中的版本 v$V 不一致，请先更新版本号"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      - name: Decode signing keystore
        if: env.HAS_SIGNING == 'true'
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build release APK (signed)
        if: env.HAS_SIGNING == 'true'
        env:
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # 未配置签名 Secrets 时兜底：debug 签名的 release 包（仅供测试分发）
      - name: Build release APK (fallback debug signing)
        if: env.HAS_SIGNING != 'true'
        run: |
          echo "::warning::未配置签名 Secrets，本次 Release 使用 debug 签名"
          ./gradlew assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk inkwell-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: inkwell-${{ github.ref_name }}.apk
          generate_release_notes: true
          # 带 - 后缀的 tag（如 v0.2.0-beta.1）标记为预发布 → 只推给测试版渠道
          prerelease: ${{ contains(github.ref_name, '-') }}
