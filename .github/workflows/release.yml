name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches configured version
        run: |
          V=$(grep -oP '^inkwell = "\K[^"]+' gradle/libs.versions.toml)
          if [ "v$V" != "${{ github.ref_name }}" ]; then
            echo "::error::tag ${{ github.ref_name }} 与 libs.versions.toml 中的版本 v$V 不一致，请先更新版本号"
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew test

      # 暂用 debug 签名出包；配置正式签名后改为 assembleRelease + 签名步骤
      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk inkwell-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: inkwell-${{ github.ref_name }}.apk
          generate_release_notes: true
          # 带 - 后缀的 tag（如 v0.2.0-beta.1）标记为预发布 → 只推给测试版渠道
          prerelease: ${{ contains(github.ref_name, '-') }}
